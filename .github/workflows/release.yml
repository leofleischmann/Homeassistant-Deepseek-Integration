name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if manifest.json changed in push
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          manifest_path="custom_components/deepseek_conversation/manifest.json"

          # For the first push on a branch, GitHub may use an all-zero "before" SHA.
          if [[ "$before" =~ ^0+$ ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$before" "$after" -- "$manifest_path" | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if manifest.json did not change
        if: steps.changed.outputs.changed != 'true'
        run: |
          echo "manifest.json unchanged in this push; skipping release."

      - name: Read version from manifest.json
        id: manifest
        if: steps.changed.outputs.changed == 'true'
        run: |
          version="$(python - <<'PY'
          import json
          from pathlib import Path
          p = Path("custom_components/deepseek_conversation/manifest.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          print(data["version"])
          PY
          )"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tagcheck
        shell: bash
        if: steps.changed.outputs.changed == 'true'
        run: |
          set -euo pipefail
          tag="${{ steps.manifest.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if tag exists
        if: steps.changed.outputs.changed == 'true' && steps.tagcheck.outputs.exists == 'true'
        run: |
          echo "Tag ${{ steps.manifest.outputs.tag }} exists; skipping release."

      - name: Read release notes from CHANGELOG.md
        if: steps.changed.outputs.changed == 'true' && steps.tagcheck.outputs.exists != 'true'
        id: notes
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.manifest.outputs.version }}
        run: |
          set -euo pipefail
          version="${RELEASE_VERSION}"
          delim="EOF_$(openssl rand -hex 16)"
          body="$(python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          changelog = Path("CHANGELOG.md")
          if changelog.is_file():
              content = changelog.read_text(encoding="utf-8")
              pattern = (
                  rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)"
              )
              match = re.search(pattern, content, flags=re.MULTILINE | re.DOTALL)
              if match:
                  print(match.group(0).strip())
                  raise SystemExit(0)
          raise SystemExit(1)
          PY
          )" || body=""

          if [ -z "$body" ]; then
            echo "[Debug release]: CHANGELOG section for $version missing; using git log fallback"
            last_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            {
              echo "body<<${delim}"
              echo "## Änderungen"
              echo
              if [ -n "$last_tag" ]; then
                echo "**Vergleich:** $last_tag ... $version"
                echo
                git log --no-merges --pretty=format:"- %s (%h)" "$last_tag"..HEAD
              else
                git log --no-merges --pretty=format:"- %s (%h)"
              fi
              echo
              echo "${delim}"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<${delim}"
              echo "$body"
              echo "${delim}"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create Git tag
        if: steps.changed.outputs.changed == 'true' && steps.tagcheck.outputs.exists != 'true'
        run: |
          git tag "${{ steps.manifest.outputs.tag }}"
          git push origin "${{ steps.manifest.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.changed.outputs.changed == 'true' && steps.tagcheck.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.manifest.outputs.tag }}
          name: ${{ steps.manifest.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
