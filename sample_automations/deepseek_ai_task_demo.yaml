# AI Task demo — plain text and structured output.
# Trigger: Developer tools → Events → deepseek_ai_task_demo
#
# Resolves the first loaded deepseek_conversation config entry and its AI Task entity.
# Results: persistent notification + logbook. Token sensors update after each call.

alias: DeepSeek AI Task demo
description: Demonstrates ai_task.generate_data (plain + structured).
mode: single
trigger:
  - platform: event
    event_type: deepseek_ai_task_demo
action:
  - variables:
      entry_id: >-
        {{ config_entries('deepseek_conversation') | first }}
      ai_task_entity: >-
        {{ device_entities(device_id(entry_id)) | select('search', 'ai_task') | first }}
  - action: ai_task.generate_data
    data:
      task_name: demo_summary
      instructions: >-
        In one short sentence, describe what Home Assistant is in plain language.
      entity_id: "{{ ai_task_entity }}"
    response_variable: plain_result
  - action: ai_task.generate_data
    data:
      task_name: demo_structured
      instructions: >-
        Reply with a JSON object describing a fictional smart-home room.
      entity_id: "{{ ai_task_entity }}"
      structure:
        room_name:
          selector:
            text:
        device_count:
          selector:
            number:
    response_variable: structured_result
  - action: persistent_notification.create
    data:
      title: DeepSeek AI Task demo
      message: >-
        Plain: {{ plain_result.data }}

        Structured room: {{ structured_result.data.room_name }}
        ({{ structured_result.data.device_count }} devices)
  - action: logbook.log
    data:
      name: DeepSeek AI Task
      message: >-
        plain={{ plain_result.data }} structured={{ structured_result.data }}
