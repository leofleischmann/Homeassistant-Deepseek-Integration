# Removed generate_image service

generate_content:
  name: Generate content (DeepSeek) # Added (DeepSeek) for clarity
  description: Sends a conversational query to DeepSeek. Optional per-call overrides for model, temperature, thinking, max_tokens, and JSON response format; unset fields use the integration options.
  fields:
    config_entry:
      required: true
      selector:
        config_entry:
          integration: deepseek_conversation # Updated integration domain
    prompt:
      required: true
      selector:
        text:
          multiline: true
      example: "Hello, how can I help you?"
    chat_model:
      example: deepseek-v4-flash
      selector:
        text:
    temperature:
      example: 1.0
      selector:
        number:
          min: 0
          max: 2
          step: 0.05
          mode: slider
    thinking_enabled:
      example: false
      selector:
        boolean:
    max_tokens:
      example: 1500
      selector:
        number:
          min: 1
          max: 1000000
          mode: box
    response_format:
      example: json_object
      selector:
        select:
          options:
            - label: JSON object
              value: json_object
    # Keep filenames, but note its functionality depends on API support
    filenames:
      selector:
        text:
          multiline: true
      example: |
        - /config/www/image.jpg

run_debug:
  name: Run DeepSeek debug suite
  description: >
    Exhaustive diagnostics: environment/versions, HTTP GET to base URL, optional models.list,
    registered LLM APIs, entity registry, many chat.completions (non-stream + stream, thinking on/off,
    system message, multi-turn, high max_tokens probe, JSON mode, parallel pings), dual log excerpts,
    JSON appendix in the report file. Writes /config/deepseek_conversation_debug_report.txt and
    creates a persistent notification (many API calls — small max_tokens per call but longer runtime).
  fields:
    config_entry:
      required: true
      selector:
        config_entry:
          integration: deepseek_conversation
    log_tail_lines:
      default: 600
      example: 600
      selector:
        number:
          min: 50
          max: 8000
          step: 50
          mode: box
